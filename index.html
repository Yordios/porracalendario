<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FutBeer Porra 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-image: url('logoporra.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .container { background: rgba(0, 0, 0, 0.85); padding: 25px; border-radius: 20px; max-width: 900px; margin: auto; border: 2px solid #88d498; }
        h1, h2 { color: #88d498; cursor: pointer; }
        .partido { background: #2d5a27; margin: 10px 0; padding: 15px; border-radius: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .grid-grupos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .tabla-grupo { width: 100%; border-collapse: collapse; background: #1a1a1a; font-size: 0.85em; }
        .tabla-grupo th, .tabla-grupo td { padding: 6px; border: 1px solid #444; }
        input[type="number"] { width: 40px; padding: 5px; border-radius: 4px; border: none; text-align: center; }
        select { padding: 8px; width: 200px; border-radius: 5px; border: none; cursor: pointer; }
        button { padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; font-weight: bold; border: none; background: #88d498; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titulo" ondblclick="toggleAdmin()">FutBeer Porra 2026</h1>
    <label>Día del Mundial:</label>
    <input type="date" id="fechaSelector" onchange="render()" style="padding:8px; border-radius:5px; border:none; text-align:center;">
    
    <h2>Partidos del día</h2>
    <div id="lista-partidos"></div>
    <button onclick="toggleGrupos()">Ver todos los grupos</button>
    
    <div id="seccion-busqueda" style="margin-top:20px;">
        <h2>Consultar Equipo</h2>
        <select id="selectEquipo" onchange="render()"><option value="">Selecciona un equipo...</option></select>
        <div id="info-equipo" style="margin-top:15px;"></div>
        <div id="tabla-equipo-seleccionado" style="margin-top:10px;"></div>
    </div>

    <h2>Posiciones</h2>
    <div id="tablas-grupos" class="grid-grupos"></div>
</div>

<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBWONqVhrJST2OGmXNRB12YiFezt7fRzbE",
        authDomain: "porracalendario.firebaseapp.com",
        projectId: "porracalendario",
        storageBucket: "porracalendario.firebasestorage.app",
        messagingSenderId: "260889924811",
        appId: "1:260889924811:web:413ad22b2ef8e869b0b74e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const grupos = {
        "Grupo A": ["México", "Sudáfrica", "Corea del Sur", "Chequia"],
        "Grupo B": ["Canadá", "Bosnia", "Catar", "Suiza"],
        "Grupo C": ["Brasil", "Marruecos", "Haití", "Escocia"],
        "Grupo D": ["Estados Unidos", "Paraguay", "Australia", "Turquía"],
        "Grupo E": ["Alemania", "Curazao", "Costa de Marfil", "Ecuador"],
        "Grupo F": ["Países Bajos", "Japón", "Suecia", "Túnez"],
        "Grupo G": ["Bélgica", "Egipto", "Irán", "Nueva Zelanda"],
        "Grupo H": ["España", "Cabo Verde", "Arabia Saudí", "Uruguay"],
        "Grupo I": ["Francia", "Senegal", "Irak", "Noruega"],
        "Grupo J": ["Argentina", "Argelia", "Austria", "Jordania"],
        "Grupo K": ["Portugal", "Uzbekistán", "Colombia", "Congo"],
        "Grupo L": ["Inglaterra", "Croacia", "Ghana", "Panamá"]
    };

    const datosIniciales = [/* ... (tu lista de partidos) ... */]; 
    // Nota: Asegúrate de mantener tu lista completa de objetos aquí.

    let partidos = JSON.parse(localStorage.getItem('porraData')) || [...datosIniciales];
    let isAdmin = false, verTodosGrupos = false;

    function toggleAdmin() {
        if (!isAdmin) {
            if(prompt("Contraseña:") === "admin2026") { isAdmin = true; render(); }
        } else {
            if(confirm("¿Resetear todos los resultados?")) { localStorage.removeItem('porraData'); location.reload(); }
        }
    }

    function toggleGrupos() { verTodosGrupos = !verTodosGrupos; render(); }

    function editar(i, campo, valor) { 
        partidos[i][campo] = parseInt(valor) || 0; 
        partidos[i].jugado = true;
        localStorage.setItem('porraData', JSON.stringify(partidos)); 
        render(); 
    }

    function cargarEquipos() {
        const select = document.getElementById('selectEquipo');
        const todos = [...new Set(Object.values(grupos).flat())].sort();
        todos.forEach(eq => select.innerHTML += `<option value="${eq}">${eq}</option>`);
    }

    function render() {
        const f = document.getElementById('fechaSelector').value;
        const selEq = document.getElementById('selectEquipo').value;
        const lista = document.getElementById('lista-partidos');
        const seccionBusqueda = document.getElementById('seccion-busqueda');
        
        seccionBusqueda.classList.toggle('hidden', isAdmin);
        
        const hoy = partidos.filter(p => p.fecha === f);
        lista.innerHTML = hoy.length > 0 ? hoy.map((p) => {
            const index = partidos.indexOf(p);
            return `<div class="partido">${p.equipo1} 
                ${isAdmin ? `<input type="number" value="${p.g1}" onchange="editar(${index}, 'g1', this.value)">` : p.g1} 
                vs 
                ${isAdmin ? `<input type="number" value="${p.g2}" onchange="editar(${index}, 'g2', this.value)">` : p.g2} 
                ${p.equipo2} <br><small>${p.grupo} - ${p.hora}</small></div>`
        }).join('') : "<p>No hay partidos este día.</p>";

        const infoEq = document.getElementById('info-equipo');
        const tablaEq = document.getElementById('tabla-equipo-seleccionado');
        
        if(!isAdmin && selEq) {
            const pEq = partidos.filter(p => p.equipo1 === selEq || p.equipo2 === selEq);
            infoEq.innerHTML = "<h3>Partidos de " + selEq + "</h3>" + pEq.map(p => 
                `<div class="partido" style="font-size:0.8em">${p.fecha}: ${p.equipo1} ${p.g1} vs ${p.g2} ${p.equipo2}</div>`
            ).join('');
            const gEq = Object.keys(grupos).find(g => grupos[g].includes(selEq));
            tablaEq.innerHTML = `<h3>Tabla ${gEq}</h3>` + generarTabla(gEq);
        } else { infoEq.innerHTML = ""; tablaEq.innerHTML = ""; }

        const cont = document.getElementById('tablas-grupos');
        cont.innerHTML = "";
        const gSeleccionado = !isAdmin && selEq ? [Object.keys(grupos).find(g => grupos[g].includes(selEq))] : null;
        
        // CORRECCIÓN APLICADA AQUÍ:
        const m = gSeleccionado ? gSeleccionado : (verTodosGrupos ? Object.keys(grupos).sort() : [...new Set(hoy.map(p => p.grupo))]);
        
        m.forEach(g => cont.innerHTML += `<div><h3>${g}</h3>${generarTabla(g)}</div>`);
    }

    function generarTabla(g) {
        if (!g) return "";
        let pts = {}; grupos[g].forEach(e => pts[e] = 0);
        partidos.filter(p => p.grupo === g && p.jugado === true).forEach(p => {
            if (p.g1 > p.g2) pts[p.equipo1] += 3;
            else if (p.g2 > p.g1) pts[p.equipo2] += 3;
            else { pts[p.equipo1] += 1; pts[p.equipo2] += 1; }
        });
        const orden = grupos[g].sort((a, b) => (pts[b] || 0) - (pts[a] || 0));
        return `<table class="tabla-grupo"><tr><th>Equipo</th><th>PTS</th></tr>` + orden.map(e => `<tr><td>${e}</td><td>${pts[e] || 0}</td></tr>`).join('') + `</table>`;
    }

    window.onload = () => { document.getElementById('fechaSelector').value = "2026-06-11"; cargarEquipos(); render(); };
</script>
</body>
</html>
